name: Build & Release Qevra AI

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0, v1.2.3
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Required to create GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          # macOS code signing (optional — leave empty to skip signing)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qevra-ai-${{ matrix.platform }}
          path: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
