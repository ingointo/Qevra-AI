name: Build & Release Qevra AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Windows: CI=true prevents interactive prompts during electron binary install
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm ci
        env:
          CI: true
          ELECTRON_GET_USE_PROXY: false

      - name: Install dependencies (Mac/Linux)
        if: matrix.os != 'windows-latest'
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Disable code signing — avoids "not a file" error when no cert is set
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qevra-ai-${{ matrix.platform }}
          path: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.AppImage
          generate_release_notes: true
          token: ${{ secrets.GH_TOKEN }}
